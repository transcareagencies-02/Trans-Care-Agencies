<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset Sent</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .success-icon {
            font-size: 50px;
            color: #22c55e;
        }

        .btn-custom {
            background: #2563eb;
            color: white;
            border-radius: 10px;
        }

        .btn-custom:hover {
            background: #1d4ed8;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card p-4 text-center bg-white">

                <div class="success-icon mb-3">
                    ✅
                </div>

                <h3 class="mb-3">Check Your Email</h3>

                <p class="text-muted">
                    We’ve sent password reset instructions to your email address.
                    If an account exists, you will receive it shortly.
                </p>

                <hr>

                <p class="small text-secondary">
                    Didn’t receive the email? Check spam folder or try again.
                </p>

                <a href="{% url 'accounts:login' %}" class="btn btn-custom mt-3 w-100">
                    Back to Login
                </a>

            </div>

        </div>
    </div>
</div>

</body>
</html>
