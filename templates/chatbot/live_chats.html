{% extends "base.html" %}

{% block content %}

<style>

.chat-container{
    max-width:1200px;
    margin:auto;
    padding:40px;
}

.chat-title{
    font-size:32px;
    font-weight:800;
    margin-bottom:25px;
}

.chat-card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.customer{
    font-size:18px;
    font-weight:700;
}

.status{
    padding:6px 12px;
    border-radius:20px;
    color:white;
}

.open{
    background:#16a34a;
}

.closed{
    background:#dc2626;
}

.btn-chat{
    background:#2563eb;
    color:white;
    padding:10px 18px;
    text-decoration:none;
    border-radius:10px;
}

</style>

<div class="chat-container">

    <h1 class="chat-title">
        💬 Live Customer Chats
    </h1>

    {% for session in sessions %}

    <div class="chat-card">

        <div>

            <div class="customer">
                {{ session.customer.username }}
            </div>

            <small>
                {{ session.created_at }}
            </small>

        </div>

        <div>

            <span class="status {{ session.status }}">
                {{ session.status }}
            </span>

            <a href="{% url 'chat_detail' session.id %}"
               class="btn-chat">
                Open Chat
            </a>

        </div>

    </div>

    {% empty %}

    <p>No active chats.</p>

    {% endfor %}

</div>

{% endblock %}
