{% extends "base.html" %}

{% block content %}

<style>

.chat-page{
    max-width:1000px;
    margin:auto;
    padding:30px;
}

.chat-window{
    background:white;
    border-radius:20px;
    height:600px;
    display:flex;
    flex-direction:column;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.chat-header{
    background:#16a34a;
    color:white;
    padding:20px;
    font-size:20px;
    font-weight:700;
}

.chat-messages{
    flex:1;
    overflow-y:auto;
    padding:20px;
    background:#f8fafc;
}

.chat-input{
    display:flex;
    padding:15px;
    border-top:1px solid #e2e8f0;
}

.chat-input input{
    flex:1;
    padding:14px;
    border-radius:12px;
    border:1px solid #cbd5e1;
}

.chat-input button{
    margin-left:10px;
    border:none;
    background:#16a34a;
    color:white;
    padding:14px 20px;
    border-radius:12px;
}

.user-msg{
    background:#dcfce7;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
    text-align:right;
}

.staff-msg{
    background:white;
    border:1px solid #e2e8f0;
    padding:12px;
    border-radius:12px;
    margin-bottom:10px;
}

</style>

<div class="chat-page">

<div class="chat-window">

<div class="chat-header">
💬 Transcare Support
</div>

<div id="messages" class="chat-messages">
</div>

<div class="chat-input">

<input
    type="text"
    id="message"
    placeholder="Type your message..."
>

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

</div>

<script>

let sessionId = null;

fetch("/chatbot/start/")
.then(res => res.json())
.then(data => {

    sessionId = data.session_id;

    loadMessages();

});

let lastMessageCount = null;

function playNotificationSound(){
    const context = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = context.createOscillator();
    const gain = context.createGain();

    oscillator.type = 'sine';
    oscillator.frequency.setValueAtTime(520, context.currentTime);
    gain.gain.setValueAtTime(0.1, context.currentTime);

    oscillator.connect(gain);
    gain.connect(context.destination);

    oscillator.start();
    oscillator.stop(context.currentTime + 0.12);
}

function sendMessage(){

    const message =
    document.getElementById("message").value;

    if(!message) return;

    fetch("/chatbot/send/",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            session_id:sessionId,
            message:message
        })

    })

    .then(()=>{
        document.getElementById("message").value="";
        loadMessages();
    });

}

function loadMessages(){

    fetch(`/chatbot/messages/${sessionId}/`)
    .then(res=>res.json())
    .then(data=>{

        if (lastMessageCount !== null && data.length > lastMessageCount) {
            playNotificationSound();
        }
        lastMessageCount = data.length;

        let html="";

        data.forEach(msg=>{

            if(msg.sender === "{{ request.user.username }}"){

                html += `
                <div class="user-msg">
                    ${msg.message}
                </div>
                `;

            }else{

                html += `
                <div class="staff-msg">
                    <strong>Support:</strong><br>
                    ${msg.message}
                </div>
                `;
            }

        });

        document.getElementById("messages").innerHTML = html;

    });

}

setInterval(loadMessages,3000);

</script>

{% endblock %}
