{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Trans Care Agencies</title>

    <link rel="icon" href="{% static 'images/logo.jpg' %}" type="image/jpg">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>

        body{
            font-family: 'Inter', sans-serif;
            background:#f8fafc;
            margin:0;
            padding:0;
        }

        /* NAVBAR */
        .navbar-custom{
            background:#0f172a;
            padding:16px 40px;
            box-shadow:0 5px 30px rgba(0,0,0,0.08);
        }

        .brand-logo{
            color:white;
            font-size:26px;
            font-weight:800;
            text-decoration:none;
        }

        .brand-logo:hover{
            color:#22c55e;
        }

        .nav-link-custom{
            color:#cbd5e1;
            text-decoration:none;
            margin:0 10px;
            font-weight:600;
            transition:0.3s;
        }

        .nav-link-custom:hover{
            color:#22c55e;
        }

        /* CART */
        .cart-btn{
            position:relative;
            background:linear-gradient(135deg,#16a34a,#15803d);
            color:white;
            padding:10px 18px;
            border-radius:14px;
            text-decoration:none;
            font-weight:700;
            transition:0.3s;
        }

        .cart-btn:hover{
            color:white;
            transform:translateY(-2px);
        }

        .cart-badge{
            position:absolute;
            top:-8px;
            right:-8px;
            background:#ef4444;
            color:white;
            width:22px;
            height:22px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:11px;
            font-weight:800;
        }

        .btn-auth{
            border-radius:12px;
            padding:8px 16px;
            font-weight:600;
        }

        .dashboard-btn{
            background:#22c55e;
            color:white;
            border:none;
        }

        .dashboard-btn:hover{
            background:#15803d;
            color:white;
        }

        /* MAIN CONTENT */
        .main-content{
            min-height:80vh;
        }

    </style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-custom">

    <div class="container-fluid">

        <!-- LOGO -->
        <a class="brand-logo" href="/">
            Trans Care Agencies
        </a>

        <!-- MOBILE BUTTON -->
        <button class="navbar-toggler bg-light"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#mainNavbar">

            <span class="navbar-toggler-icon"></span>

        </button>

        <!-- NAV CONTENT -->
        <div class="collapse navbar-collapse" id="mainNavbar">

            <div class="ms-auto d-flex align-items-center flex-wrap gap-2">

                <a href="/" class="nav-link-custom">
                    Home
                </a>

                <a href="{% url 'products' %}" class="nav-link-custom">
                    Products
                </a>

                <a href="{% url 'about' %}" class="nav-link-custom">
                    About
                </a>

                <a href="{% url 'contact' %}" class="nav-link-custom">
                    Contact
                </a>

                <a href="/quotes/" class="nav-link-custom">
                    Quotes
                </a>

                <!-- CART -->
                <a href="{% url 'cart' %}" class="cart-btn">
                    🛒 Cart

                    <span id="cart-count" class="cart-badge">
                        {{ cart_count|default:"0" }}
                    </span>
                </a>

                <!-- AUTH -->
                {% if user.is_authenticated %}

                    <span class="text-light fw-bold ms-2">
                        Hi, {{ user.username }}
                    </span>

                    <a href="{% url 'admin_dashboard' %}"
                        class="btn btn-auth dashboard-btn">
                        Dashboard
                    </a>

                    <a href="{% url 'accounts:logout' %}" class="btn btn-danger btn-auth">
                        Logout
                    </a>

                {% else %}

                    <a href="{% url 'accounts:login' %}"
                        class="btn btn-outline-light btn-auth">
                        Login
                    </a>

                    <a href="{% url 'accounts:register' %}"
                        class="btn btn-success btn-auth">
                        Register
                    </a>

                {% endif %}

            </div>

        </div>

    </div>

</nav>

<!-- MAIN CONTENT -->
<div class="main-content">

    {% block content %}
    {% endblock %}

</div>

<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- CART COUNT AUTO UPDATE -->
<script>

function updateCartCount() {

    fetch("/orders/cart/count/")

    .then(res => res.json())

    .then(data => {

        const cartCount = document.getElementById("cart-count");

        if(cartCount){
            cartCount.innerText = data.count;
        }

    });

}

setInterval(updateCartCount, 5000);

</script>

<!-- CHATBOT STYLE -->
<style>

.chat-float{
    position:fixed;
    bottom:25px;
    right:25px;
    width:65px;
    height:65px;
    border-radius:50%;
    background:#16a34a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    font-size:30px;
    z-index:9999;
    box-shadow:0 8px 25px rgba(0,0,0,.25);
}

</style>

<a href="{% url 'chat_home' %}" class="chat-float">
💬
</a>

</body>
</html>
