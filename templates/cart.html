<!DOCTYPE html>
<html>
<head>
    <title>Your Cart</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/dist/styles.css' %}">
</head>

<body class="bg-base-200">

<!-- NAV -->
<div class="navbar bg-base-100 shadow">
    <a href="/" class="btn btn-ghost text-xl">Trans Care Cart</a>
</div>

<section class="p-10 max-w-5xl mx-auto">

    <h1 class="text-3xl font-bold mb-6">Your Cart</h1>

    {% if items %}

        <div class="space-y-4">

            {% for item in items %}

            <div class="card bg-white shadow p-4 flex justify-between items-center">

                <div>
                    <h2 class="font-bold">{{ item.product.name }}</h2>
                    <p>Qty: {{ item.quantity }}</p>
                </div>

                <div class="text-green-700 font-bold">
                    KES {{ item.total }}
                </div>

                <a href="{% url 'remove_cart_item' item.id %}"
                   class="btn btn-error btn-sm">
                    Remove
                </a>

            </div>

            {% endfor %}

        </div>

        <div class="mt-8 text-right">
            <h2 class="text-2xl font-bold">
                Total: KES {{ total }}
            </h2>

            <a href="/orders/checkout/" class="btn btn-primary mt-4">
                Proceed to Checkout
            </a>
        </div>

    {% else %}

        <p class="text-gray-500">Your cart is empty.</p>

    {% endif %}

</section>

</body>
</html>
